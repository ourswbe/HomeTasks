services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: hometasks
      POSTGRES_USER: hometasks
      POSTGRES_PASSWORD: hometasks
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hometasks -d hometasks"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    environment:
      FLASK_ENV: development
      SECRET_KEY: change-me-in-production
      DATABASE_URL: postgresql+psycopg2://hometasks:hometasks@db:5432/hometasks
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
